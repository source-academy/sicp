on:
  push:
    branches:
      - master

# kill any builds still running from older commits
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install pandoc
        run: |
          URL="https://github.com/jgm/pandoc/releases/download/2.14.0.1/pandoc-2.14.0.1-1-amd64.deb"
          wget $URL -O /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          # The above script adapted from https://gist.github.com/rossant/8b751a15d71d6d9403a8
      - name: Install TeX Live and Inkscape
        run: |
          sudo apt-get update -y
          sudo apt-get install -y texlive texlive-fonts-extra latexmk
      - name: Fetch Yarn dependencies
        run: yarn install --frozen-lockfile
      - name: Build (JavaScript edition)
        run: |
          set -euxo pipefail
          yarn run pdf || (cat latex_pdf_js/sicpjs.log && false)
          yarn run split
          yarn run programs
          yarn run json
          yarn run md
      - name: Package (JavaScript edition)
        run: yarn run prepare
      # The Python edition is published additively (split_py/, json_py/,
      # sicpy.pdf, sicpy.zip, sicpy.md). Best-effort: any failure here must
      # never block the already-assembled JavaScript deploy.
      - name: Build (Python edition)
        continue-on-error: true
        env:
          SICP_EDITION: py
        run: |
          set -euxo pipefail
          yarn run split
          yarn run json
          yarn run programs
          yarn run md
          yarn run pdf || (cat latex_pdf_py/sicpy.log && false)
      - name: Package (Python edition)
        continue-on-error: true
        env:
          SICP_EDITION: py
        run: yarn run prepare
      # The Scheme edition (json + pdf) is published additively (json_scheme/,
      # sicpscheme.pdf). Best-effort, like Python: a failure must never block
      # the JavaScript deploy.
      - name: Build (Scheme edition)
        continue-on-error: true
        env:
          SICP_EDITION: scm
        run: |
          set -euxo pipefail
          yarn run json
          yarn run pdf || (cat latex_pdf_scm/sicp.log && false)
      - name: Package (Scheme edition)
        continue-on-error: true
        env:
          SICP_EDITION: scm
        run: yarn run prepare
      # chatbot_notes_py/ is a hand-curated resource (RAG knowledge base for
      # SICPy chatbots), checked into git rather than generated by the build.
      # Publish it as-is alongside the generated editions.
      - name: Publish SICPy chatbot knowledge base
        run: |
          mkdir -p docs_out/chatbot_notes_py
          cp -r chatbot_notes_py/. docs_out/chatbot_notes_py/
      - name: Strip build .gitignore files
        run: find docs_out -name .gitignore -delete -print
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs_out
          cname: sicp.sourceacademy.org
          force_orphan: true
